kind = "web"
previewPath = "/"
title = "BANTAH AI DEGEN"
version = "1.0.0"
id = "artifacts/bantah"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20341

[services.development]
run = "pnpm --filter @workspace/bantah run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bantah", "run", "build" ]
publicDir = "artifacts/bantah/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20341"
BASE_PATH = "/"
