<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />

    <link rel="canonical" href="https://anyalpha.up.railway.app/" />
    <meta property="og:site_name" content="AnyAlpha Terminal" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AnyAlpha Terminal | Live Crypto Market Intelligence" />
    <meta property="og:description" content="Search tokens, scan live pairs, track wallets, follow launch activity, and review market signals from one compact AnyAlpha terminal." />
    <meta property="og:url" content="https://anyalpha.up.railway.app/" />
    <meta property="og:image" content="https://anyalpha.up.railway.app/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AnyAlpha Terminal | Live Crypto Market Intelligence" />
    <meta name="twitter:description" content="Search tokens, scan live pairs, track wallets, follow launch activity, and review market signals from one compact AnyAlpha terminal." />
    <meta name="twitter:image" content="https://anyalpha.up.railway.app/opengraph.jpg" />
    <meta name="twitter:image:alt" content="AnyAlpha Terminal market intelligence dashboard" />
    <link rel="icon" href="/favicon.ico?v=20260523" sizes="any" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png?v=20260523" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260523" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260523" />
    <link rel="manifest" href="/site.webmanifest?v=20260523" />
    <link rel="preload" as="image" href="/splash-logo.png?v=20260525" media="(max-width: 767px)" />
    <script>
      (() => {
        try {
          const mobileSplash = window.matchMedia('(max-width: 767px)').matches &&
            (window.matchMedia('(hover: none)').matches || window.matchMedia('(pointer: coarse)').matches);
          document.documentElement.dataset.splash = mobileSplash ? 'mobile' : 'desktop';
        } catch {
          document.documentElement.dataset.splash = 'desktop';
        }
      })();
    </script>
    <style>
      html {
        background: #11151d;
        color-scheme: dark;
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100svh;
        background: inherit;
      }

      #root {
        min-height: 100vh;
        min-height: 100svh;
      }

      #desktop-boot-shell {
        display: none;
      }

      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        place-items: center;
        min-height: 100vh;
        min-height: 100svh;
        background: #0f1117;
        transition: opacity 180ms ease, visibility 180ms ease;
      }

      #app-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
        visibility: hidden;
      }

      #app-splash img {
        width: 128px;
        height: 128px;
        object-fit: contain;
        border-radius: 20px;
        filter: drop-shadow(0 22px 50px rgba(0, 0, 0, 0.45));
      }

      html[data-splash='mobile'] #app-splash {
        display: grid;
      }

      html[data-splash='mobile'] #app-splash img {
        width: min(34vw, 128px);
        height: min(34vw, 128px);
      }

      @media (max-width: 767px) and (hover: none), (max-width: 767px) and (pointer: coarse) {
        #app-splash {
          display: grid;
        }

        #app-splash img {
          width: min(34vw, 128px);
          height: min(34vw, 128px);
        }
      }

      html[data-splash='desktop'] #app-splash {
        display: none !important;
        opacity: 0 !important;
        pointer-events: none !important;
        visibility: hidden !important;
      }

      @media (min-width: 768px), (hover: hover) and (pointer: fine) {
        #app-splash {
          display: none !important;
          opacity: 0 !important;
          pointer-events: none !important;
          visibility: hidden !important;
        }
      }

      @media (min-width: 768px) {
        #desktop-boot-shell {
          display: grid;
          grid-template-columns: 76px minmax(0, 1fr);
          min-height: 100vh;
          min-height: 100svh;
          background: #11151d;
          color: #e7ecf5;
          font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .boot-rail {
          border-right: 1px solid rgba(255, 255, 255, 0.08);
          background: #151a23;
          padding: 16px 12px;
        }

        .boot-logo {
          display: grid;
          place-items: center;
          width: 42px;
          height: 42px;
          border-radius: 12px;
          background: #f97316;
          color: #0b0d12;
          font-size: 24px;
          font-weight: 900;
        }

        .boot-nav {
          display: grid;
          gap: 12px;
          margin-top: 28px;
        }

        .boot-dot,
        .boot-pill,
        .boot-card,
        .boot-line {
          overflow: hidden;
          position: relative;
          background: rgba(255, 255, 255, 0.08);
        }

        .boot-dot::after,
        .boot-pill::after,
        .boot-card::after,
        .boot-line::after {
          animation: boot-sheen 1.35s ease-in-out infinite;
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
          content: "";
          inset: 0;
          position: absolute;
          transform: translateX(-100%);
        }

        .boot-dot {
          border-radius: 12px;
          height: 36px;
          width: 36px;
        }

        .boot-main {
          display: flex;
          flex-direction: column;
          min-width: 0;
        }

        .boot-topbar {
          align-items: center;
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
          display: flex;
          gap: 16px;
          min-height: 58px;
          padding: 10px 18px;
        }

        .boot-pill {
          border-radius: 14px;
          height: 34px;
          max-width: 360px;
          width: 32vw;
        }

        .boot-actions {
          display: flex;
          gap: 10px;
          margin-left: auto;
        }

        .boot-action {
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 12px;
          height: 34px;
          width: 34px;
        }

        .boot-content {
          display: grid;
          gap: 12px;
          grid-template-columns: minmax(0, 1.7fr) minmax(280px, 0.8fr);
          min-height: 0;
          padding: 12px;
        }

        .boot-card {
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 8px;
          min-height: 180px;
        }

        .boot-table {
          display: grid;
          gap: 10px;
          padding: 14px;
        }

        .boot-line {
          border-radius: 8px;
          height: 16px;
        }

        @keyframes boot-sheen {
          to {
            transform: translateX(100%);
          }
        }
      }

      @media (max-width: 767px) {
        #desktop-boot-shell {
          display: none !important;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-splash {
          transition: none;
        }
      }

    </style>
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem('theme');
          const theme = savedTheme || 'dark';
          const html = document.documentElement;

          if (theme === 'dark') {
            html.classList.add('dark');
            html.style.background = '#0f1117';
          } else {
            html.classList.remove('dark');
            html.style.background = '#ffffff';
          }

          html.style.colorScheme = theme;
        } catch {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <img src="/splash-logo.png?v=20260525" alt="" onerror="this.onerror=null;this.src='/anyalpha-logo.png?v=20260523';" />
    </div>
    <div id="root">
      <div id="desktop-boot-shell" aria-hidden="true">
        <aside class="boot-rail">
          <div class="boot-logo">a</div>
          <div class="boot-nav">
            <div class="boot-dot"></div>
            <div class="boot-dot"></div>
            <div class="boot-dot"></div>
            <div class="boot-dot"></div>
          </div>
        </aside>
        <main class="boot-main">
          <div class="boot-topbar">
            <div class="boot-pill"></div>
            <div class="boot-actions">
              <div class="boot-action"></div>
              <div class="boot-action"></div>
              <div class="boot-action"></div>
            </div>
          </div>
          <div class="boot-content">
            <section class="boot-card boot-table">
              <div class="boot-line"></div>
              <div class="boot-line"></div>
              <div class="boot-line"></div>
              <div class="boot-line"></div>
              <div class="boot-line"></div>
              <div class="boot-line"></div>
            </section>
            <section class="boot-card boot-table">
              <div class="boot-line"></div>
              <div class="boot-line"></div>
              <div class="boot-line"></div>
            </section>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
